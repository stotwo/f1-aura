name: Deploy to AlwaysData

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to SFTP
        uses: wlixcc/SFTP-Deploy-Action@v1.2.4
        with:
          server: ${{ secrets.SFTP_SERVER }}
          username: ${{ secrets.SFTP_USERNAME }}
          password: ${{ secrets.SFTP_PASSWORD }}
          port: 22
          local_path: './'
          remote_path: '/www'
          sftp_only: true
          # Note: Cette action ne supporte plus 'ignore_files' directement ici
          # On déploie tout, mais le fichier config.php ne sera pas écrasé s'il est déjà sur le serveur
          # car git ne touche pas aux fichiers .gitignore (config.php devrait y être idéalement)

