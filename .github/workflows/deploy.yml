name: Deploy to AlwaysData

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install LFTP
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Deploy via SFTP
        run: |
          mkdir -p ~/.ssh
          HOST="${{ secrets.SFTP_SERVER }}"
          USER="${{ secrets.SFTP_USERNAME }}"
          PASS="${{ secrets.SFTP_PASSWORD }}"
          
          echo "Debug: HOST=${HOST} (Length: ${#HOST})"
          echo "Debug: USER=${USER} (Length: ${#USER})"
          echo "Debug: PASS=[HIDDEN] (Length: ${#PASS})"
          
          if [ -z "$HOST" ]; then
            echo "ERROR: SFTP_SERVER secret is empty!"
            exit 1
          fi

          ssh-keyscan -H "$HOST" >> ~/.ssh/known_hosts || true
          
          lftp -c "set sftp:auto-confirm yes; \
          set net:timeout 20; \
          set net:max-retries 2; \
          open -u \"$USER\",\"$PASS\" sftp://$HOST; \
          mirror --reverse --verbose --exclude .git/ --exclude .github/ --exclude .vscode/ --exclude config.php --exclude node_modules/ --exclude full_import.sql . /www"

            full_import.sql

